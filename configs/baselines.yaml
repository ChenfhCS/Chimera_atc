# Baseline configuration. Per-model entries override the top-level defaults.
#
# Notes:
#   * Models marked "auth: gated" require `huggingface-cli login` with a token
#     that has been granted access on the model card.
#   * `state-spaces/mamba2-2.7b` is NOT a HuggingFace AutoModelForCausalLM
#     checkpoint (it ships as `mamba_ssm.MambaLMHeadModel`). We substitute the
#     HuggingFace-native `state-spaces/mamba2-hybrid-2.7b-300b` here; if you
#     really need the original 2.7B Mamba-2, see
#     `docs/baselines.md` for the mamba_ssm wrapper path.
#   * Jamba and Nemotron-H need transformers>=4.46 and `trust_remote_code=true`.
#   * Names below are used verbatim with `--models`.

torch_dtype: bfloat16
device_map: auto
trust_remote_code: true
split: validation

datasets:
  - arc-e
  - arc-c
  - piqa
  - truthfulqa
  - cnn/dm
  - govreport

models:
  # ---------- Small tier (≤4.5B) ----------
  - name: Llama-3-3.2B
    path: meta-llama/Llama-3.2-3B
    # auth: gated
  - name: Mamba-2-2.7B
    # Replace with state-spaces/mamba2-2.7b only if you wire up the mamba_ssm
    # loader described in docs/baselines.md.
    path: state-spaces/mamba-2.8b-hf
  - name: Jamba-3.2B
    path: ai21labs/AI21-Jamba2-3B          # confirm this repo exists on HF
  - name: Nemotron-H-4.5B
    path: nvidia/Nemotron-H-4B-Base-8K
    torch_dtype: bfloat16

  # ---------- Large tier (≥8B) ----------
  - name: Llama-3-13B
    path: elinas/Llama-3-13B-Instruct
  - name: Mamba-2-8.2B
    path: nvidia/mamba2-8b-3t-4k
  - name: Jamba-13B
    path: OxxoCodes/jamba-small-v1
  - name: Nemotron-H-12B
    path: nvidia/NVIDIA-Nemotron-Nano-12B-v2
